<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="theme-color" content="#ffffff" />

    <title>Diseña facil y jugando tu cocina modular en 2D. Renderiza con IA probando distintos acabados.</title>
    <meta
      name="description"
      content="Diseña tu cocina soñada en 2D de forma fácil. Arrastra módulos, cambia medidas y obtené la cotización en tiempo real por calidad (Started, Premium, Deluxe). Exportá tu diseño a PDF."
    />
    <meta
      name="keywords"
      content="diseño de cocinas, cocina 2D, cotización cocina, muebles de cocina, planner cocina, presupuesto cocina online"
    />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />

    <link rel="canonical" href="https://cocinaplay.com/" />

    <!-- Open Graph -->
    <meta property="og:locale" content="es_AR" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cocinaplay — Diseña tu cocina en 2D con cotización instantánea" />
    <meta
      property="og:description"
      content="Arrastrá módulos, elegí medidas y calidad, y mirá el precio en vivo. Exportá tu plano y resumen en PDF."

    <meta property="og:url" content="https://cocinaplay/" />
    <meta property="og:site_name" content="Cocinaplay" />
    <meta property="og:image" content="%PUBLIC_URL%/og-cover.png" />
    <meta property="og:image:width" content="1200" />

      content="Planificá tu cocina en 2D y obtené la cotización en tiempo real. Exportá tu diseño a PDF."

    <meta name="twitter:image" content="%PUBLIC_URL%/og-cover.png" />

          {
            "@type": "WebSite",
            "name": "Cocinaplay",
            "url": "https://cocinaplay.com/",
            "potentialAction": {

        max-width: 800px;
